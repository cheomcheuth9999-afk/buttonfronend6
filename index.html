<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Button</title>
</head>
<style>
    .con {
        margin: 50px;
        margin-left: 40px;
    }
    button {
        padding: 12px 30px;
        border: none;
        color: white;
        border-radius: 6px;
        margin-right: 18px;
    }
    h3 {
        font-family: sans-serif;
        font-size: 32px;
    }
    .pbtn1 {
        background-color: blue;
        color: white;
    }
    .pbtn2 {
        background-color: black;
        color: white;
    }

    .pbtn3 {
        background-color: white;
        color: black;
        border: 5px solid black;
        border-radius: 30px;
    }
    .pbtn4 {
        background-color: brown;
        cursor: pointer;
        transition: all 0.5s;
    }
    .pbtn4:hover {
        background-color: black;
    }
    .pbtn5 {
        background-color: brown;
        cursor: pointer;
        transition: all 0.5s;
        color: blue;
    }
    .pbtn5:hover:hover {
        background-color: transparent;
        color: blue;
        outline: 2px solid blue;
    }
    .pbtn6 {
        background-color: transparent;
        cursor: pointer;
        transition: all 0.5s;  
        /* ដើម្បីអោយយឺត */
        color: blue;
        outline: 3px solid black;
        border-radius: 30px;
    }
    .pbtn6:hover:hover {
        background-color: black;
        color: white;
        border: none;
    }
    .pbtn7 {
        background-color: black;
        cursor: pointer;
        /* ដើម្បីដាក់ម៉ៅអោយចង្អុល */
        transition: all 0.5s;
    }
    .pbtn7:hover:hover{
        transform: scale(1.2);
        /* ដើម្បីបង្រីក​បង្រ */
        background-color: aqua;
        }
    .pbtn8 {
        background-color: blue;
        cursor: pointer;
        transition: 0.5s;
        
    }
    .pbtn8:hover {
        transform: rotate(90deg);
        background-color: brown;
    }
    .pbtn9 {
        background-color: brown;
        cursor: pointer;
        transition: all 0.3s;
    }
    .pbtn9:hover {
        background-color: blueviolet;
        transform: scale(0.9);

    }
    </style>

<body>
    <div class="con">
        <h3>Primary</h3>
        <button class="pbtn1">Primary-btn</button>
        <button class="pbtn2">Primary-btn</button>
        <button class="pbtn3">Primary-btn</button>
    </div>
    <div class="con">
        <h3>Primary</h3>
        <button class="pbtn4">Primary-btn</button>
        <button class="pbtn5">Primary-btn</button>
        <button class="pbtn6">Primary-btn</button>
    </div>
</body>
    <div class="con">
        <h3>Primary</h3>
        <button class="pbtn7">Primary-btn</button>
        <button class="pbtn8">Primary-btn</button>
        <button class="pbtn9">Primary-btn</button>
    </div>
</body>

</html>
